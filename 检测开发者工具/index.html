<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    //  解决方法
    (function() {
    // 需要 Hook 的方法列表
    const methods = ['debug', 'log', 'warn', 'info', 'error'];

    methods.forEach(method => {
        // 保存原始方法
        const original = console[method];

        // 重写方法
        console[method] = function(...args) {
            // 核心逻辑：检查参数中是否包含 Error 对象
            // 如果包含 Error 对象，我们推测这是检测脚本，直接拦截，不执行打印
            if (args.some(arg => arg instanceof Error)) {
                return;
            }

            // 如果不是检测代码，则正常打印
            return original.apply(console, args);
        };
    });

    // 顺便把讨厌的 console.clear 也干掉，防止它清空你的日志
    console.clear = function() {};

    console.log("已成功 Hook Console，检测失效。");
})();

    (function() {
    const originalSetInterval = window.setInterval;

    window.setInterval = function(callback, delay) {
        // 将回调函数转为字符串检查
        const code = callback.toString();

        // 特征匹配：如果代码里包含特定的 alert 内容或 debugger 逻辑
        if (code.includes('你打开了开发者工具') || code.includes('isDebuggingEnv')) {
            console.log('拦截到调试检测定时器，已阻止运行。');
            return null; // 直接返回，不启动定时器
        }

        // 正常的定时器放行
        return originalSetInterval.apply(this, arguments);
    };
})();

    (function() {
    const originalDefineProperty = Object.defineProperty;

    Object.defineProperty = function(obj, prop, descriptor) {
        // 核心特征匹配：
        // 1. 属性名是 'stack'
        // 2. 描述符里有 get 方法 (getter)
        // 3. 这里的 obj 往往是 Error 对象（虽然此处较难判断 obj 类型，但结合前两点通常足够）
        if (prop === 'stack' && descriptor && descriptor.get) {
            console.log('拦截到 stack getter 劫持，已阻止。');
            return obj;
        }

        return originalDefineProperty.apply(this, arguments);
    };
})();

    // ---------------------方法---------------------

    function isDebuggingEnv() {
        let detected = false;
        const errorProxy = new Error();
        Object.defineProperty(errorProxy, 'stack', {
            configurable: false, enumerable: false, get: function () {
                alert("你打开了开发者工具");
                return '';
            }
        });


        ['debug', 'log', 'warn', 'info', 'error'].forEach(method => {
            console[method](errorProxy);
        });

        console.clear();
    }
    setInterval(isDebuggingEnv, 100);



</script>
</body>
</html>
