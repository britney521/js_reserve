{% extends "base.html" %}
{% block content %}

<!-- 分类选项卡 - 顶部横向菜单 -->

    <div class="container mx-auto px-4">
        <div class="flex space-x-2 py-3">
            <!--            <button class="subcategory-btn whitespace-nowrap px-4 py-2 rounded-lg bg-primary text-white"-->
            <!--                    data-subcategory="all">-->
            <!--                <i class="fa fa-globe mr-1"></i>全部-->
            <!--            </button>-->
            <div class="h-6 border-r border-gray-300 mx-1"></div>

            <button class="subcategory-btn whitespace-nowrap px-4 py-2 rounded-lg bg-white hover:bg-gray-100"

                <i class="fa fa-rocket mr-1"></i>科幻
            </button>
            <button class="subcategory-btn whitespace-nowrap px-4 py-2 rounded-lg bg-white hover:bg-gray-100"

<!-- 主内容区 -->
<main class="container mx-auto px-4 py-6">
    <!-- 数据状态指示器 - 一行显示 -->
    <div id="status-indicator" class="mb-6 flex items-center justify-center">
        <div id="loading" class="hidden flex items-center">
            <div class="inline-block animate-spin rounded-full h-5 w-5 border-3 border-primary border-t-transparent mr-2"></div>
            <p class="text-gray-600">正在获取数据...</p>
        </div>
        <div id="error" class="hidden flex items-center text-red-500">
            <i class="fa fa-exclamation-circle mr-2"></i>
            <p>数据获取失败，请稍后重试</p>
        </div>
        <div id="success" class="hidden flex items-center text-gray-600">
            <i class="fa fa-check-circle text-green-500 mr-2"></i>
            <p>数据已更新，上次更新时间：<span id="last-update">--:--:--</span></p>
        </div>
    </div>

    <!-- 排行榜列表 -->
    <div id="ranking-container">
        <!-- 数据将通过 JavaScript 动态填充 -->
    </div>
</main>

{% endblock %}
    {% block js %}
<script>
    // 全局变量
    let allItems = [];
    let currentSubcategory = 'new';
    let currentSearch = '';



    // 格式化播放量
    function formatPlays(plays) {
        if (plays >= 100000000) {
            return (plays / 100000000).toFixed(1) + '亿';
        } else if (plays >= 10000) {
            return (plays / 10000).toFixed(1) + '万';
        }
        return plays.toString();
    }

    // 格式化粉丝数
    function formatFollowers(followers) {
        if (followers >= 10000) {
            return (followers / 10000).toFixed(1) + '万';
        }
        return followers.toString();
    }

    // 格式化时间
    function formatTime(date) {
        return date.toTimeString().slice(0, 8);
    }


    // 过滤数据
    function filterItems(items, subcategory, search) {
        let result = [...items];
        if (subcategory !== 'all') {
            result = result.filter(item => item.subcategory === subcategory);
        }
        if (search) {
            const term = search.toLowerCase();
            result = result.filter(item =>
                item.title.toLowerCase().includes(term) ||
                item.anchor.toLowerCase().includes(term)
            );
        }
        return result;
    }

    // 高亮搜索词
    function highlightText(text, searchTerm) {
        if (!searchTerm) return text;

        const term = searchTerm.toLowerCase();
        const index = text.toLowerCase().indexOf(term);
        if (index === -1) return text;

        const before = text.substring(0, index);
        const match = text.substring(index, index + searchTerm.length);
        const after = text.substring(index + searchTerm.length);

        return `${before}<span class="search-highlight">${match}</span>${after}`;
    }

    // 获取转化率的样式类（以50%为基准）
    function getConversionRateClass(conversionRate) {
        if (conversionRate >= 50) return 'conversion-high';
        return 'conversion-low';
    }

    // 获取评分的样式类（以10分为基准）
    function getRatingClass(rating) {
        if (rating >= 9) return 'text-rating-high';
        if (rating >= 7) return 'text-rating-medium';
        return 'text-rating-low';
    }

    // 获取上架天数的样式类
    function getDaysSincePublishClass(days) {
        if (days <= 7) return 'text-primary font-medium'; // 一周内，蓝色高亮
        if (days <= 14) return 'text-secondary font-medium'; // 两周内，橙色
        return 'text-gray-600'; // 两周以上，灰色
    }

    // 显示数据
    function displayItems(items) {
        const container = document.getElementById('ranking-container');
        container.innerHTML = '';

        if (items.length === 0) {
            container.innerHTML = `
                    <div class="bg-white rounded-lg p-10 text-center">
                        <i class="fa fa-search text-gray-300 text-5xl mb-4"></i>
                        <p class="text-gray-500">没有找到匹配的内容</p>
                        <button id="try-again-btn" class="mt-4 text-primary hover:text-primary/80">
                            清除筛选条件
                        </button>
                    </div>
                `;

            document.getElementById('try-again-btn').addEventListener('click', () => {
                currentSearch = '';
                currentSubcategory = 'all';

                // 更新按钮状态


                document.querySelectorAll('.subcategory-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.subcategory-btn').forEach(b => {
                            b.classList.remove('bg-blue-600', 'text-white');
                            b.classList.add('bg-white', 'hover:bg-gray-100');
                        });
                        btn.classList.add('bg-blue-600', 'text-white');
                        currentSubcategory = btn.dataset.subcategory;
                        performSearch(currentSearch);
                    });
                });

                performSearch('');
            });

            return;
        }

        // 创建表头行
        const headerRow = document.createElement('div');
        headerRow.className = 'bg-white rounded-lg overflow-hidden shadow-header sticky top-[132px] z-10';
        headerRow.innerHTML = `
                <div class="p-2 md:p-3 grid grid-cols-1 md:grid-cols-11 half-gap bg-gray-100">
                    <div class="col-span-1 flex items-center justify-center text-xs md:text-sm font-medium">
                        排名
                    </div>
                    <div class="col-span-3 flex items-center pl-4 text-xs md:text-sm font-medium">
                        专辑信息
                    </div>
                    <div class="col-span-2 flex items-center text-xs md:text-sm font-medium">
                        主播
                    </div>
                    <div class="col-span-1 flex items-center justify-center text-xs md:text-sm font-medium">
                        总播放量
                    </div>
                    <div class="col-span-1 flex items-center justify-center text-xs md:text-sm font-medium">
                        播放增量
                    </div>
                    <div class="col-span-2 flex items-center justify-center text-xs md:text-sm font-medium">
                        上架日期
                    </div>
                    <div class="col-span-1 flex items-center justify-center text-xs md:text-sm font-medium">
                        操作
                    </div>
                </div>
            `;
        container.appendChild(headerRow);

        // 创建列表容器
        const listContainer = document.createElement('div');
        listContainer.className = 'space-y-4 mt-4';

        // 填充列表数据
        items.forEach((item, index) => {
            const rankClass = index < 3 ? 'bg-secondary text-white' : 'bg-gray-100 text-gray-700';
            const rankIcon = index < 3 ? '<i class="fa fa-trophy"></i>' : (index + 1).toString();
            const playsIncreaseClass = item.playsIncrease > 0 ? 'text-up' : 'text-down';
            const episodesIncreaseClass = item.episodesIncrease > 0 ? 'text-up' : 'text-down';
            const ratingClass = getRatingClass(parseFloat(item.rating));
            const daysSincePublishClass = getDaysSincePublishClass(item.daysSincePublish);

            // 计算转化率样式和显示文本
            let conversionRateHtml = '';
            if (item.episodes >= 10) {
                const rate = parseFloat(item.conversionRate);
                const rateClass = getConversionRateClass(rate);
                conversionRateHtml = `
                        <div class="flex flex-col">
                            <div class="text-xs text-gray-500 mb-0.5">播放转化率</div>
                            <div class="text-xs font-medium">
                                <span class="conversion-rate ${rateClass}">${item.conversionRate}%</span>
                            </div>
                        </div>
                    `;
            } else {
                conversionRateHtml = `
                        <div class="flex flex-col">
                            <div class="text-xs text-gray-500 mb-0.5">播放转化率</div>
                            <div class="text-xs text-gray-400">不足10集</div>
                        </div>
                    `;
            }

            // 创建主要内容行
            const mainRow = document.createElement('div');
            mainRow.className = 'bg-white rounded-lg overflow-hidden shadow-sm hover-scale ring-1 ring-gray-100';
            mainRow.innerHTML = `
                    <div class="list-content p-2 md:p-3 grid grid-cols-1 md:grid-cols-11 half-gap">
                        <div class="col-span-1 flex items-center justify-center">
                            <div class="w-6 h-6 md:w-8 md:h-8 rounded-full flex items-center justify-center text-xs md:text-sm font-bold ${rankClass}">
                                ${rankIcon}
                            </div>
                        </div>
                        <div class="col-span-3">
                            <div class="flex items-center">

                                <div class="ml-3 flex flex-col">
                                    <div class="text-xs md:text-sm font-medium">${highlightText(item.title, currentSearch)}</div>
                                    <div class="flex items-center space-x-2 mt-0.5">
                                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${item.subcategory}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-span-2 flex items-center">
                            <div class="flex items-center text-xs">
                                <i class="fa fa-user-circle text-gray-400 mr-1 text-xs"></i>
                                ${highlightText(item.anchor, currentSearch)}
                                <span class="ml-2 text-gray-500 text-xs">${formatFollowers(item.followers)}粉丝</span>
                            </div>
                        </div>
                        <div class="col-span-1 flex items-center justify-center">
                            <div class="text-xs font-medium">${formatPlays(item.plays)}</div>
                        </div>
                        <div class="col-span-1 flex items-center justify-center">
                            <div class="flex items-center text-xs ${playsIncreaseClass}">
                                <i class="fa fa-plus-circle mr-1 text-xs"></i>
                                ${formatPlays(item.playsIncrease)}
                            </div>
                        </div>
                        <div class="col-span-1 flex items-center justify-center">
                            <div class="text-xs">
                                <span class="font-medium">${item.publishedDate}</span>
                                <span class="ml-1 ${daysSincePublishClass}">(${item.daysSincePublish}天)</span>
                            </div>
                        </div>
                        <div class="col-span-2 flex items-center justify-center">
                            <button onclick="location.href='/detail?id=${encodeURIComponent(item.id)}&title=${encodeURIComponent(item.title)}'"
          class="view-detail-btn bg-primary hover:bg-primary/90 text-white text-xs px-2 py-1 rounded transition-colors whitespace-nowrap">
    进入详情
  </button>
                             <button class="toggle-detail-btn view-detail-btn bg-primary hover:bg-primary/90 text-white text-xs px-2 py-1 rounded transition-colors whitespace-nowrap">
                        <span class="mr-1">查看详情</span>
                        <i class="fa fa-chevron-down toggle-icon text-xs"></i>
                    </button>
                        </div>
                    </div>
                    
                    <!-- 详细信息行 - 使用统一背景色和圆角进行数据分组 -->
                          <div class="collapse-content collapsed">
                    <div class="bg-gray-50 p-3 border-t border-gray-100">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <!-- 第一组：总声音数，集数增量 -->
                            <div class="data-group">
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="flex flex-col">
                                        <div class="text-xs text-gray-500 mb-0.5">总声音数</div>
                                        <div class="text-xs font-medium">${item.totalEpisodes} 集</div>
                                    </div>
                                    <div class="flex flex-col">
                                        <div class="text-xs text-gray-500 mb-0.5">集数增量</div>
                                        <div class="flex items-center text-xs ${episodesIncreaseClass} font-medium">
                                            <i class="fa fa-plus-circle mr-1 text-xs"></i>
                                            ${item.episodesIncrease}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 第二组：首集播放量，第10集播放量，播放转化率 -->
                            <div class="data-group">
                                <div class="grid grid-cols-3 gap-2">
                                    <div class="flex flex-col">
                                        <div class="text-xs text-gray-500 mb-0.5">首集播放量</div>
                                        <div class="text-xs font-medium">${formatPlays(item.firstEpisodePlays)}</div>
                                    </div>
                                    <div class="flex flex-col">
                                        <div class="text-xs text-gray-500 mb-0.5">第10集播放量</div>
                                        <div class="text-xs font-medium">${item.episodes >= 10 ? formatPlays(item.tenthEpisodePlays) : '不足10集'}</div>
                                    </div>
                                    ${conversionRateHtml}
                                </div>
                            </div>
                            
                            <!-- 第三组：专辑评分，专辑评价数 -->
                            <div class="data-group">
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="flex flex-col">
                                        <div class="text-xs text-gray-500 mb-0.5">专辑评分</div>
                                        <div class="flex items-center text-xs">
                                            <div class="font-medium mr-1 ${ratingClass}">${item.rating}</div>
                                            <div class="text-yellow-400">
                                                ${generateStarRating(parseFloat(item.rating))}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex flex-col">
                                        <div class="text-xs text-gray-500 mb-0.5">专辑评价数</div>
                                        <div class="text-xs font-medium">${item.reviews} 条</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    </div>
                `;


            listContainer.appendChild(mainRow);
        });

        container.appendChild(listContainer);

        // 添加分页控件
        const pagination = document.createElement('div');
        pagination.className = 'flex justify-between items-center mt-6 text-sm';

        const info = document.createElement('div');
        info.className = 'text-gray-500';
        info.textContent = `显示 ${items.length} 条结果`;

        const controls = document.createElement('div');
        controls.className = 'flex items-center space-x-2';
        controls.innerHTML = `
                <button class="px-3 py-1 border rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i class="fa fa-chevron-left text-xs"></i>
                </button>
                <button class="px-3 py-1 bg-primary text-white rounded">1</button>
                <button class="px-3 py-1 border rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <i class="fa fa-chevron-right text-xs"></i>
                </button>
            `;

        pagination.appendChild(info);
        pagination.appendChild(controls);
        container.appendChild(pagination);
    }

    // 生成星级评分
    function generateStarRating(rating) {
        let stars = '';
        const fullStars = Math.floor(rating / 2); // 10分制转为5星制
        const halfStar = (rating % 2) >= 1;
        const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);

        for (let i = 0; i < fullStars; i++) {
            stars += '<i class="fa fa-star"></i>';
        }

        if (halfStar) {
            stars += '<i class="fa fa-star-half-o"></i>';
        }

        for (let i = 0; i < emptyStars; i++) {
            stars += '<i class="fa fa-star-o"></i>';
        }

        return stars;
    }

    // 获取数据
    async function fetchData() {
        // 显示加载状态
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('error').classList.add('hidden');
        document.getElementById('success').classList.add('hidden');

        try {

            // 生成数据
            const res = await fetch(`/api/rank?type=${currentSubcategory}`);   //
            const json = await res.json();
            if (!res.ok || json.error) {          // 后端返回 404 或带 error 字段
                alert(json.error || '网络错误');
            }

            allItems = json.data || [];
            console.log(allItems, 'allItems')

            // 更新状态
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            document.getElementById('last-update').textContent = formatTime(new Date());

            displayItems(allItems);

            return json.data || [];
        } catch (error) {
            console.error('数据获取失败:', error);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            return [];
        }
    }

    // 执行搜索
    function performSearch(searchTerm) {
        currentSearch = searchTerm;
        if (currentSubcategory == 'all') {
            displayItems(allItems);
        } else {
            // category = subcategoryMap[currentSubcategory]
            // const filteredItems = filterItems(allItems, category, searchTerm);
            fetchData()
        }
    }

    // 初始化页面
    async function init() {

        // 加载数据
        const data = await fetchData();

        // 分类按钮事件
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新按钮状态
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('bg-primary', 'text-white');
                    b.classList.add('bg-white', 'hover:bg-gray-100');
                });
                btn.classList.add('bg-primary', 'text-white');
                btn.classList.remove('bg-white', 'hover:bg-gray-100');

                // 更新分类并刷新数据
                currentSubcategory = btn.getAttribute('data-category');
                performSearch(currentSearch);
            });
        });

        // 子分类按钮事件
        document.querySelectorAll('.subcategory-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新按钮状态
                document.querySelectorAll('.subcategory-btn').forEach(b => {
                    b.classList.remove('bg-primary', 'text-white');
                    b.classList.add('bg-white', 'hover:bg-gray-100');
                });
                btn.classList.add('bg-primary', 'text-white');
                btn.classList.remove('bg-white', 'hover:bg-gray-100');

                // 更新子分类并刷新数据
                currentSubcategory = btn.getAttribute('data-subcategory');
                performSearch(currentSearch);
            });
        });

        // 刷新按钮事件
        document.getElementById('refresh-btn').addEventListener('click', async () => {
            const newData = await fetchData();
            allItems = newData;
            performSearch(currentSearch);
        });
    }

    // 初始化页面
    document.addEventListener('DOMContentLoaded', init);

    // 1. 给所有 toggle 按钮注册事件（事件委托或循环绑定都可以，这里用事件委托）
    document.addEventListener('click', function (e) {
        // 点击的是「查看详情」按钮本身或其内部元素
        const btn = e.target.closest('.toggle-detail-btn');
        if (!btn) return;

        // 2. 找到当前行里的 collapse-content
        const row = btn.closest('.bg-white');            // 找到当前卡片根节点
        const content = row.querySelector('.collapse-content');

        // 3. 切换折叠状态
        content.classList.toggle('collapsed');

        // 4. 同步图标方向（chevron-down <-> chevron-up）
        const icon = btn.querySelector('.toggle-icon');
        if (content.classList.contains('collapsed')) {
            icon.classList.remove('fa-chevron-up');
            icon.classList.add('fa-chevron-down');
        } else {
            icon.classList.remove('fa-chevron-down');
            icon.classList.add('fa-chevron-up');
        }
    });

</script>

{% endblock %}
